<!DOCTYPE html>
<html>
<head>
<title>Spin Wheel Event</title>

<style>
body{
font-family:Arial;
background:#0f172a;
color:white;
text-align:center;
}

#wheel{
width:400px;
height:400px;
margin:40px auto;
border-radius:50%;
background:
conic-gradient(
gold 0deg 7deg,
green 7deg 14deg,
red 14deg 360deg
);
transition:transform 4s ease-out;
}

button{
padding:15px 35px;
font-size:20px;
background:gold;
border:none;
border-radius:12px;
cursor:pointer;
}

input{
padding:10px;
font-size:16px;
border-radius:8px;
border:none;
}

#result{
font-size:28px;
margin-top:20px;
}
</style>
</head>

<body>

<h1>Spin Wheel Giveaway</h1>

<input id="name" placeholder="Enter your name"><br><br>

<div id="wheel"></div>

<button onclick="spin()">Spin</button>

<h2 id="result"></h2>

<script>

let spins=0;

function spin(){

let r=Math.floor(Math.random()*3600);
document.getElementById("wheel").style.transform="rotate("+r+"deg)";

setTimeout(()=>{

let result=Math.floor(Math.random()*50);

if(result===7){

document.getElementById("result").innerHTML="🎁 WINNER!";
}
else if(result===23){

document.getElementById("result").innerHTML="TRY AGAIN";
}
else{

document.getElementById("result").innerHTML="NICE TRY";
}

spins++;

},4000);

}

</script>

</body>
</html>
